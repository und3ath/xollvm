<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="hl-rose" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#e11d48"/></linearGradient>
    <linearGradient id="hl-orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#ea580c"/></linearGradient>
    <linearGradient id="hl-amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#d97706"/></linearGradient>
    <linearGradient id="hl-teal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#0d9488"/></linearGradient>
    <linearGradient id="hl-blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="hl-indigo" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#4338ca"/></linearGradient>
    <filter id="hl-sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.28"/></filter>
    <style>
      .lt{fill:#fff;font-weight:700;font-size:13px}
      .core{fill:#fff;font-weight:700;font-size:16px}
      .cs{fill:#fff;fill-opacity:.88;font-weight:500;font-size:12px}
      .h{fill:#0f172a;font-weight:700;font-size:14px}
      .lg{fill:#475569;font-size:12.5px;font-weight:600}
      .kbd{font-family:'Cascadia Code',Consolas,monospace;font-weight:700}
    </style>
  </defs>

  <g filter="url(#hl-sh)">
    <rect x="40" y="40" width="520" height="480" rx="20" fill="url(#hl-rose)"/>
    <rect x="70" y="72" width="460" height="416" rx="18" fill="url(#hl-orange)"/>
    <rect x="100" y="104" width="400" height="352" rx="16" fill="url(#hl-amber)"/>
    <rect x="130" y="136" width="340" height="288" rx="14" fill="url(#hl-teal)"/>
    <rect x="160" y="168" width="280" height="224" rx="12" fill="url(#hl-blue)"/>
    <rect x="190" y="200" width="220" height="160" rx="10" fill="url(#hl-indigo)"/>
  </g>

  <text class="lt" x="300" y="60" text-anchor="middle">L5 &#183; Anti-debug timing gates &#8212; <tspan class="kbd">antiDebug</tspan> (RDTSC, needs hardened)</text>
  <text class="lt" x="300" y="92" text-anchor="middle">L4 &#183; Structural hardening &#8212; <tspan class="kbd">hardened=1</tspan></text>
  <text class="lt" x="300" y="124" text-anchor="middle">L3 &#183; Register-value XOR &#8212; <tspan class="kbd">regEncrypt</tspan></text>
  <text class="lt" x="300" y="156" text-anchor="middle">L2 &#183; Bytecode encryption &#8212; <tspan class="kbd">useAES</tspan> / LCG</text>
  <text class="lt" x="300" y="188" text-anchor="middle">L1 &#183; Register-index XOR &#8212; <tspan class="kbd">obfRegIdx</tspan></text>
  <text class="core" x="300" y="272" text-anchor="middle">Bytecode interpreter</text>
  <text class="cs" x="300" y="296" text-anchor="middle">fetch &#8594; decode</text>
  <text class="cs" x="300" y="316" text-anchor="middle">&#8594; execute &#8594; dispatch</text>
  <text class="cs" x="300" y="340" text-anchor="middle">51-opcode private ISA</text>

  <!-- legend -->
  <text class="h" x="610" y="70">Default state</text>
  <circle cx="622" cy="104" r="7" fill="#2563eb"/><text class="lg" x="640" y="109"><tspan class="kbd">obfRegIdx</tspan> &#8212; on</text>
  <circle cx="622" cy="134" r="7" fill="#0d9488"/><text class="lg" x="640" y="139"><tspan class="kbd">useAES</tspan> &#8212; on (AES-128-CTR)</text>
  <circle cx="622" cy="164" r="7" fill="#94a3b8"/><text class="lg" x="640" y="169"><tspan class="kbd">regEncrypt</tspan> &#8212; off (opt-in)</text>
  <circle cx="622" cy="194" r="7" fill="#94a3b8"/><text class="lg" x="640" y="199"><tspan class="kbd">hardened</tspan> &#8212; off (opt-in)</text>
  <circle cx="622" cy="224" r="7" fill="#2563eb"/><text class="lg" x="640" y="229"><tspan class="kbd">antiDebug</tspan> &#8212; on if hardened</text>

  <text class="h" x="610" y="284">hardened=1 also adds</text>
  <text class="lg" x="610" y="312">&#183; MBA + opaque preds in handlers</text>
  <text class="lg" x="610" y="336">&#183; FNV-1a bytecode integrity check</text>
  <text class="lg" x="610" y="360">&#183; callee-table XOR masking</text>
  <text class="lg" x="610" y="384">&#183; wrapper split / flatten / junk</text>

  <text class="lg" x="610" y="440" fill="#94a3b8">Layers stack independently. Each</text>
  <text class="lg" x="610" y="460" fill="#94a3b8">adds runtime cost &#8212; see VM.md</text>
  <text class="lg" x="610" y="480" fill="#94a3b8">performance table before enabling all.</text>
</svg>
