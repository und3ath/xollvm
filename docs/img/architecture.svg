<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="ar-indigo" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="ar-violet" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="ar-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="ar-cyan" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="ar-slate" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#94a3b8"/><stop offset="1" stop-color="#475569"/></linearGradient>
    <linearGradient id="ar-teal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#0d9488"/></linearGradient>
    <linearGradient id="ar-amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#d97706"/></linearGradient>
    <linearGradient id="ar-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#ea580c"/></linearGradient>
    <linearGradient id="ar-rose" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#e11d48"/></linearGradient>
    <marker id="ar-arw" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <filter id="ar-sh" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.22"/></filter>
    <style>
      .t{fill:#fff;font-weight:700;font-size:15px}
      .s{fill:#fff;fill-opacity:.85;font-weight:500;font-size:12px}
      .cap{fill:#64748b;font-size:11.5px;font-weight:600}
      .gt{fill:#fff;font-weight:700;font-size:13.5px;letter-spacing:.3px}
      .gp{fill:#fff;fill-opacity:.92;font-weight:600;font-size:13px}
      .edge{stroke:#94a3b8;stroke-width:2.2;fill:none}
    </style>
  </defs>

  <path class="edge" marker-end="url(#ar-arw)" d="M450,74 L450,90"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M450,144 L450,160"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M450,214 L450,230"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M450,284 L450,300"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M450,354 L450,370"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M310,325 L232,325"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M590,395 L668,395"/>
  <!-- pipeline to 4 groups -->
  <path class="edge" marker-end="url(#ar-arw)" d="M450,404 L120,470"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M450,404 L340,470"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M450,404 L560,470"/>
  <path class="edge" marker-end="url(#ar-arw)" d="M450,404 L780,470"/>

  <g filter="url(#ar-sh)"><rect x="300" y="20" width="300" height="54" rx="11" fill="url(#ar-indigo)"/></g>
  <text class="t" x="450" y="52" text-anchor="middle">llvm.global.annotations</text>

  <g filter="url(#ar-sh)"><rect x="300" y="90" width="300" height="54" rx="11" fill="url(#ar-violet)"/></g>
  <text class="t" x="450" y="122" text-anchor="middle">ObfuscationAnnotationAnalysis</text>

  <g filter="url(#ar-sh)"><rect x="300" y="160" width="300" height="54" rx="11" fill="url(#ar-violet)"/></g>
  <text class="t" x="450" y="184" text-anchor="middle">ObfuscationConfig cache</text>
  <text class="s" x="450" y="202" text-anchor="middle">Function &#8594; Config map</text>

  <g filter="url(#ar-sh)"><rect x="300" y="230" width="300" height="54" rx="11" fill="url(#ar-blue)"/></g>
  <text class="t" x="450" y="254" text-anchor="middle">ObfuscationModulePass</text>
  <text class="s" x="450" y="272" text-anchor="middle">-passes=obfuscation</text>
  <g filter="url(#ar-sh)"><rect x="20" y="300" width="212" height="50" rx="11" fill="url(#ar-cyan)"/></g>
  <text class="t" x="126" y="322" text-anchor="middle" font-size="14">StringEncryptionPass</text>
  <text class="s" x="126" y="340" text-anchor="middle">strenc &#183; module-only</text>

  <g filter="url(#ar-sh)"><rect x="300" y="300" width="300" height="54" rx="11" fill="url(#ar-blue)"/></g>
  <text class="t" x="450" y="332" text-anchor="middle">ObfuscationFunctionDriverPass</text>
  <g filter="url(#ar-sh)"><rect x="668" y="370" width="212" height="50" rx="11" fill="url(#ar-slate)"/></g>
  <text class="t" x="774" y="392" text-anchor="middle" font-size="14">ObfReportAnalysis</text>
  <text class="s" x="774" y="410" text-anchor="middle">JSON + CFG DOT sink</text>

  <g filter="url(#ar-sh)"><rect x="300" y="370" width="300" height="54" rx="11" fill="url(#ar-blue)"/></g>
  <text class="t" x="450" y="402" text-anchor="middle">Topologically ordered pipeline</text>

  <!-- 4 pass-group boxes -->
  <g filter="url(#ar-sh)"><rect x="20" y="470" width="200" height="150" rx="13" fill="url(#ar-teal)"/></g>
  <text class="gt" x="120" y="498" text-anchor="middle">EXPRESSION</text>
  <line x1="44" y1="510" x2="196" y2="510" stroke="#fff" stroke-opacity=".35"/>
  <text class="gp" x="120" y="534" text-anchor="middle">mba</text>
  <text class="gp" x="120" y="556" text-anchor="middle">substitution</text>
  <text class="gp" x="120" y="578" text-anchor="middle">sdiff</text>
  <text class="gp" x="120" y="600" text-anchor="middle">vcall</text>

  <g filter="url(#ar-sh)"><rect x="240" y="470" width="200" height="150" rx="13" fill="url(#ar-amber)"/></g>
  <text class="gt" x="340" y="498" text-anchor="middle">CONTROL FLOW</text>
  <line x1="264" y1="510" x2="416" y2="510" stroke="#fff" stroke-opacity=".35"/>
  <text class="gp" x="340" y="538" text-anchor="middle">split</text>
  <text class="gp" x="340" y="562" text-anchor="middle">bcf</text>
  <text class="gp" x="340" y="586" text-anchor="middle">flattening</text>

  <g filter="url(#ar-sh)"><rect x="460" y="470" width="200" height="150" rx="13" fill="url(#ar-orange)"/></g>
  <text class="gt" x="560" y="498" text-anchor="middle">POST-HARDENING</text>
  <line x1="484" y1="510" x2="636" y2="510" stroke="#fff" stroke-opacity=".35"/>
  <text class="gp" x="560" y="544" text-anchor="middle">shield</text>
  <text class="gp" x="560" y="572" text-anchor="middle">adec</text>

  <g filter="url(#ar-sh)"><rect x="680" y="470" width="200" height="150" rx="13" fill="url(#ar-rose)"/></g>
  <text class="gt" x="780" y="498" text-anchor="middle">VIRTUALISATION</text>
  <line x1="704" y1="510" x2="856" y2="510" stroke="#fff" stroke-opacity=".35"/>
  <text class="gp" x="780" y="540" text-anchor="middle">vm</text>
  <text class="s" x="780" y="566" text-anchor="middle">replaces the entire</text>
  <text class="s" x="780" y="584" text-anchor="middle">function body</text>

  <text class="cap" x="450" y="646" text-anchor="middle">ordering enforced by topological sort &#183; vm &#10007; flattening are mutually exclusive</text>
</svg>
